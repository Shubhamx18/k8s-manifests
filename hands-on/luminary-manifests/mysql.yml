apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: luminary
spec:
  serviceName: mysql-service
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                  secretKeyRef:
                     name: luminary-secret
                     key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                 configMapKeyRef:
                    name: luminary-config
                    key:  MYSQL_DATABASE
          volumeMounts:
            - name: luminary-volume
              mountPath:  /var/lib/mysql

  volumeClaimTemplates:
          - metadata:
              name: luminary-volume
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                 requests:
                   storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: luminary
spec:
  clusterIP: None
  selector:
        app: mysql
  ports:
    - port: 3306
      targetPort: 3306
