apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: luminary
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: shubhamm18/luminary:backend
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: mysql-service
            - name: DB_NAME
              value: project_management_db
            - name: DB_USER
              value: root
            - name: DB_PASSWORD
              value: Shubham@6024
            - name: MYSQL_PORT
              value: "3306"
            - name: JWT_SECRET
              value: luminary_dev_secret_key_2024
            - name: AGORA_APP_ID
              value: e6061be9565b47e0b9705f86de2a42f5
            - name: AGORA_APP_CERTIFICATE
              value: 8bfbd4ed44254e25be4402e84f40d642
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: luminary
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
